<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCU Caving Club | Exploration Refined</title>
    <style>
        /* CSS Variables for professional consistency */
        :root {
            --mint: #A3DFD1;
            --black: #1a1a1a;
            --white: #ffffff;
            --soft-gray: #f9f9f9;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Base Styles */
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            background-color: var(--white); 
            color: var(--black); 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Fade-In-Up Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header & Logo */
        header { 
            padding: 60px 20px 20px; 
            text-align: center; 
            background: var(--white);
        }
        
        .logo { 
            max-width: 120px; 
            height: auto; 
            filter: grayscale(10%) contrast(1.1);
            transition: var(--transition);
        }
        
        .logo:hover {
            transform: scale(1.05);
        }

        .club-name { 
            font-size: 1.2rem; 
            font-weight: 300; 
            letter-spacing: 5px; 
            text-transform: uppercase;
            margin-top: 20px;
        }

        /* Minimalist Sticky Nav */
        nav { 
            background-color: rgba(255, 255, 255, 0.95); 
            padding: 20px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 1px solid #eee;
        }
        
        nav ul { 
            list-style: none; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            gap: 40px;
        }
        
        nav a { 
            color: var(--black); 
            font-size: 0.75rem;
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-decoration: none;
            position: relative;
            transition: var(--transition);
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -5px;
            left: 0;
            background-color: var(--mint);
            transition: var(--transition);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Hero / Main Content */
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 80px 20px; 
            animation: fadeInUp 1.2s ease-out; /* Applying the animation */
        }

        .welcome-section { 
            text-align: center; 
            max-width: 700px;
            margin: 0 auto;
        }

        h2 { 
            font-size: 2.5rem; 
            font-weight: 700; 
            margin-bottom: 30px; 
            line-height: 1.2;
        }

        p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 40px;
        }

        .landing-image { 
            width: 100%; 
            height: 600px;
            object-fit: cover;
            border-radius: 4px; 
            filter: brightness(0.9);
            margin: 40px 0;
            transition: var(--transition);
        }

        .landing-image:hover {
            filter: brightness(1);
        }

        /* Social Footer */
        footer { 
            padding: 80px 20px; 
            text-align: center; 
            background-color: var(--soft-gray);
            border-top: 1px solid #eee;
        }

        .social-links { 
            list-style: none; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            margin-bottom: 30px;
        }
        
        .social-links a { 
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--black);
            opacity: 0.6;
            transition: var(--transition);
        }

        .social-links a:hover { 
            opacity: 1;
            color: var(--mint);
        }

        .copyright {
            font-size: 0.7rem;
            color: #999;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <img src="dcucc.jpg" alt="DCU Caving Club Logo" class="logo">
        <h1 class="club-name">DCU Caving Club</h1>
    </header>
