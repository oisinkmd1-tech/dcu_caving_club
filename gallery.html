<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | DCUCC</title>
    <style>
        :root { --mint: #A3DFD1; --black: #1a1a1a; --white: #ffffff; --soft-gray: #f9f9f9; --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--white); color: var(--black); }
        header, nav { text-align: center; }
        header { padding: 40px 20px 10px; } .logo { max-width: 80px; }
        nav { padding: 20px 0; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; background: white; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; justify-content: center; gap: 30px; }
        nav a { color: var(--black); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        .gallery-main { width: 100%; height: 600px; object-fit: cover; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 100px; }
        .grid img { width: 100%; height: 400px; object-fit: cover; filter: grayscale(100%); transition: var(--transition); }
        .grid img:hover { filter: grayscale(0%); }

        .site-map { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 80px; }
        .toc-card { padding: 30px; border: 1px solid #eee; text-decoration: none; color: var(--black); transition: var(--transition); text-align: left; }
        .toc-card:hover { border-color: var(--mint); background: var(--soft-gray); }
        footer { padding: 60px 20px; text-align: center; background: var(--soft-gray); margin-top: 100px; }
    </style>
</head>
<body>
    <header><a href="index.html"><img src="dcucc.jpg" class="logo"></a></header>
    <nav><ul><li><a href="index.html">Home</a></li><li><a href="trips.html">Trips</a></li><li><a href="gallery.html">Gallery</a></li><li><a href="highlights.html">Highlights</a></li><li><a href="about.html">About</a></li><li><a href="join.html">Join</a></li></ul></nav>
    <div class="container">
        <img src="dcucc_v1.jpg" class="gallery-main">
        <div class="grid">
            <img src="https://via.placeholder.com/800x600/1a1a1a/ffffff?text=Vertical+Descent">
            <img src="https://via.placeholder.com/800x600/1a1a1a/ffffff?text=Limestone+Formations">
        </div>

        <h2 style="font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; text-align: center;">Continue Exploring</h2>
        <div class="site-map">
            <a href="index.html" class="toc-card"><p>Home</p></a>
            <a href="trips.html" class="toc-card"><p>Trip Reports</p></a>
            <a href="highlights.html" class="toc-card"><p>Highlights</p></a>
            <a href="about.html" class="toc-card"><p>About</p></a>
            <a href="join.html" class="toc-card"><p>Join</p></a>
        </div>
    </div>
    <footer><p>&copy; 2026 DCU CAVING CLUB</p></footer>
</body>
</html>
