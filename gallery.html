<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | DCUCC</title>
    <style>
        /* Reusing global styles for consistency */
        :root { --mint: #A3DFD1; --black: #1a1a1a; --white: #ffffff; --soft-gray: #f9f9f9; --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--white); color: var(--black); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        header { padding: 40px 20px 10px; text-align: center; }
        .logo { max-width: 80px; }
        .club-name { font-size: 1rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; margin-top: 10px; }
        
        nav { background: rgba(255, 255, 255, 0.95); padding: 20px 0; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; justify-content: center; gap: 30px; }
        nav a { color: var(--black); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; animation: fadeInUp 1s ease-out; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; }
        .gallery-item { position: relative; overflow: hidden; height: 300px; background: #eee; border-radius: 2px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); filter: grayscale(40%); }
        .gallery-item:hover img { transform: scale(1.05); filter: grayscale(0%); }

        footer { padding: 60px 20px; text-align: center; background: var(--soft-gray); border-top: 1px solid #eee; margin-top: 100px; }
    </style>
</head>
<body>
    <header><a href="index.html"><img src="dcucc.jpg" class="logo"></a><div class="club-name">DCU Caving Club</div></header>
    <nav><ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="highlights.html">Highlights</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="join.html">Join</a></li>
    </ul></nav>
    <div class="container">
        <div class="gallery-grid">
            <div class="gallery-item"><img src="dcucc_v1.jpg"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/800x600/1a1a1a/A3DFD1?text=Subterranean+Passage"></div>
            <div class="gallery-item"><img src="https://via.placeholder.com/800x600/1a1a1a/A3DFD1?text=Expedition+Base"></div>
        </div>
    </div>
    <footer><p style="font-size: 0.7rem; color: #999;">&copy; 2026 DCU Caving Club</p></footer>
</body>
</html>
